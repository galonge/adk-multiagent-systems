services:
  backend:
    build:
      context: ./wealth_pilot
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENABLE_WEALTHPILOT_V2=true
    env_file:
      - ./wealth_pilot/.env
    volumes:
      # mount source code for hot reload
      - ./wealth_pilot/main.py:/app/main.py
      - ./wealth_pilot/agent.py:/app/wealth_pilot/agent.py
      - ./wealth_pilot/__init__.py:/app/wealth_pilot/__init__.py
      - ./wealth_pilot/tools:/app/wealth_pilot/tools
      - ./wealth_pilot/callbacks:/app/wealth_pilot/callbacks
      - ./wealth_pilot/.env:/app/wealth_pilot/.env
      # named volume for ADK session/artifact storage — avoids host filesystem
      # permission issues with Docker Desktop VirtioFS on macOS
      - adk_sessions:/app/wealth_pilot/.adk

  frontend:
    build:
      context: ./wealth_pilot_ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_ENABLE_WEALTHPILOT_V2=true
    volumes:
      # mount source code for hot reload
      - ./wealth_pilot_ui/app:/app/app
      - ./wealth_pilot_ui/public:/app/public
      - ./wealth_pilot_ui/next.config.ts:/app/next.config.ts
    depends_on:
      - backend

volumes:
  adk_sessions:
